# Fix for PostgreSQL timezone mismatch on Indian Windows machines
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
logging.level.org.springframework.boot.context.config=TRACE

# Centrifugo connection token secret
# Must match CENTRIFUGO_TOKEN_HMAC_SECRET_KEY in your Docker command
# IMPORTANT: Must be at least 32 characters (256 bits) for HMAC-SHA256
centrifugo.token-secret=${CENTRIFUGO_TOKEN_SECRET:}

# How long the Centrifugo connection token is valid
# 3600000ms = 1 hour
centrifugo.token-expiry-ms=3600000

# Google Sign-In
app.google.client-id=${GOOGLE_CLIENT_ID:}
