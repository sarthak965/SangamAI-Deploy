# ================================================================
# SangamAI ? Application Configuration
# ================================================================
# This file is the central configuration for your Spring Boot app.
# Spring Boot reads this automatically on startup.
# Values with ${VARIABLE_NAME} are environment variables ? you set
# them on your server or in a .env file locally. NEVER hardcode
# secrets like passwords or JWT keys directly in this file.
# ================================================================

# The name of your application (shows up in logs)
spring.application.name=sangamai-backend

# The port your server runs on. 8080 is the Spring Boot default.
server.port=${PORT:8080}

# Frontend origins allowed to call this API.
# Comma-separated origin patterns. Override in production with your Vercel/custom domains.
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,https://*.vercel.app}

# ----------------------------------------------------------------
# DATABASE (PostgreSQL)
# ----------------------------------------------------------------
# The JDBC URL tells Spring where your PostgreSQL database lives.
# Format: jdbc:postgresql://HOST:PORT/DATABASE_NAME
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings (HikariCP is Spring Boot's default pool)
# This means Spring keeps up to 10 open connections to the DB
# ready to use, so it doesn't open a new connection on every request.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate settings
# validate = Hibernate checks that your entity classes match the DB
# schema on startup but does NOT modify the schema. Flyway handles
# all schema changes. Never use 'create' or 'update' in production.
spring.jpa.hibernate.ddl-auto=validate

# Shows the SQL Hibernate generates in the logs during development.
# Set to false in production ? it's very noisy.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate which SQL dialect to use.
# This lets it generate PostgreSQL-specific SQL when needed.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ----------------------------------------------------------------
# FLYWAY (Database Migrations)
# ----------------------------------------------------------------
# Flyway is enabled by default when it's on the classpath.
# It looks for migration SQL files in src/main/resources/db/migration/
# and runs any that haven't been run yet (it tracks this in a
# 'flyway_schema_history' table in your database).
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ----------------------------------------------------------------
# FILE UPLOADS
# ----------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.workspace.project-files-dir=${PROJECT_FILES_DIR:./storage/project-files}

# ----------------------------------------------------------------
# REDIS
# ----------------------------------------------------------------
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# ----------------------------------------------------------------
# JWT CONFIGURATION
# ----------------------------------------------------------------
# The secret key used to sign and verify JWT tokens.
# In production this must be a long, random, secret string.
# Generate one with: openssl rand -hex 64
app.jwt.secret=${JWT_SECRET:}

# How long an access token is valid (in milliseconds)
# 86400000 ms = 24 hours
app.jwt.expiration-ms=86400000

# ----------------------------------------------------------------
# CENTRIFUGO
# ----------------------------------------------------------------
# The URL of your Centrifugo server's HTTP API
# and the API key Centrifugo uses to authenticate your backend calls
centrifugo.api-url=${CENTRIFUGO_API_URL:}
centrifugo.api-key=${CENTRIFUGO_API_KEY:}
app.realtime.ws-url=${REALTIME_WS_URL:}

# ----------------------------------------------------------------
# LOGGING
# ----------------------------------------------------------------
# Show INFO level logs for your own code, WARN for everything else.
# This keeps your logs clean during development.
logging.level.com.sangam.ai=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.root=INFO


